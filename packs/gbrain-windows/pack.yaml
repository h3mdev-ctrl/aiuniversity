# gbrain-on-Windows -- get gbrain installed, connected, and actually LIVE.
#
# Grounded in Andrew's real footgun notes: the Supabase pooler-URL trap (direct
# host uses IPv6 and times out on Windows) and the "wasn't even activated" MCP
# gap (it looked set up, it wasn't, nothing said so). Every check runs a REAL
# executable (gbrain / claude), so it works under cmd.exe -- the shell the runner
# uses on Windows -- not just bash.
#
# CHOICE -- pick where your brain lives:
#   --variant local     PGLite: a local file, no server, nothing to sign up for (default)
#   --variant supabase  hosted on Supabase (Postgres in the cloud, syncs across machines)
# The "is the brain reachable" check is the same either way; the variant only
# changes the setup guidance you get if it isn't.
#
# Design note: we deliberately do NOT gate on `gbrain doctor`'s overall status.
# On a working machine doctor can report "unhealthy" purely from content-sync
# noise while gbrain is perfectly usable. The pack checks USABILITY, not a score.
#
# THE MENTAL MODEL FIRST: files/gbrain_hub_model.md -- gbrain is the ONE hub you talk
# to; work / business / hobbies / side projects / people are all SPOKES that feed it.
# The #1 newcomer mistake is framing it as the mirror of ONE project (so it sounds
# like a notes app and underwhelms). Read the hub model before trying to explain
# "how is gbrain useful for me?" -- it includes the explain-it script.
#
# WHAT THE HUB BECOMES (the growth path): files/gbrain_growth_path.md -- the ladder
# from a few notes to a load-bearing brain (entity graph -> eager capture -> ingest a
# corpus -> code intelligence -> nightly automation), what each rung gives you, the
# governing principle (more SIGNAL = more useful, because recall + connections scale),
# and the lean-vs-eager token-cost table. Show this to a user asking "what will this
# actually do for me if I keep building it?"
#
# HOW TO STRUCTURE YOUR BRAIN once it's live: see files/example_brain_filing.md
# (slug conventions + a resolver-page filing map) and files/example_brain_page.md
# (the shape of a good page). Modeled on a real, heavily-used brain -- copy the
# structure, not the content.
#
# NIGHTLY "DREAM" CYCLE on Windows (optional, advanced): see
# files/dream_cycle_windows.md before you set up a nightly dream job. Key point:
# the structural half is free + model-free (do that); the LLM deep-extract needs
# a reliable chat model and a local 8B is NOT reliable for it -- you do NOT need
# codex, use structural-only or a cheap hosted model. Plus the openai:-not-ollama:
# and cmd.exe-not-PS-2>&1 Windows traps.
name: gbrain-windows
version: 0.2.1
variants: [local, supabase]
default_variant: local
steps:
  - id: install
    instruction: >
      Install gbrain and confirm the command runs. On Windows gbrain installs to
      C:\Users\<you>\.bun\bin -- that folder must be on your PATH.
    check:
      type: contains
      cmd: gbrain --version
      expect: gbrain
    on_fail: >
      "command not found" means gbrain isn't on your PATH. On Windows it lives in
      C:\Users\<you>\.bun\bin. Add that folder to PATH, open a NEW terminal, and
      run `gbrain --version` again.

  - id: brain-reachable-local
    when: local
    instruction: >
      Your brain is a LOCAL file (PGLite) -- no server, nothing to sign up for.
      Confirm gbrain can reach it. This covers "config valid" and "database
      connects" in one check.
    check:
      type: command_succeeds
      cmd: gbrain list -n 1
    on_fail: |
      gbrain can't reach a local brain. WHY it can't is the whole game here -- read
      the actual error before you touch anything:

      - "not found" / empty: no brain exists yet. Create one (no account needed):
        `gbrain init --pglite`, then re-run `gbrain list -n 1`.
      - "PGLite failed to initialize WASM runtime": on Windows this is usually a RED
        HERRING -- it does NOT mean a missing or broken brain, so do NOT re-init (that
        won't help and can throw away a good brain). Two real causes:
          1. A stale lock -- another gbrain/claude process is still holding the DB file.
             Close other gbrain/claude processes (or remove the leftover lock file) and
             retry `gbrain list -n 1`. This fixes it most of the time.
          2. Real corruption after an out-of-memory crash. ONLY if freeing locks didn't
             help: rebuild the brain. The daily maintenance task does NOT self-heal this.
        Rule: free locks and retry ONCE first; rebuild only if it still fails.

  - id: brain-reachable-supabase
    when: supabase
    instruction: >
      Your brain is HOSTED on Supabase (syncs across machines). Confirm gbrain can
      reach it. This covers "config valid" and "database connects" in one check.
    check:
      type: command_succeeds
      cmd: gbrain list -n 1
    on_fail: |
      gbrain can't reach the Supabase brain. Two Windows-specific causes, in order:

      1. The URL (most common). Use the Supabase POOLER url (host like
         aws-0-...pooler.supabase.com:6543), NOT the direct db.<project>.supabase.co
         host -- the direct host uses IPv6 and times out on most Windows networks.
         Re-run: `gbrain init --supabase --url <pooler-url>`.
      2. A BOM in a hand-edited config. If the URL is right but it still fails AND you
         edited gbrain's config/.env by hand in PowerShell: `Out-File` and `Set-Content`
         prepend an invisible UTF-8 BOM (even with `-Encoding ascii`) that breaks
         .env/.json/.yaml parsing -- the parser mis-reads the first line and the connect
         silently fails, with an error that never mentions a BOM. Prefer letting
         `gbrain init` write the file. If you must hand-edit, write it WITHOUT a BOM:
         `[System.IO.File]::WriteAllText($path, $text, (New-Object System.Text.UTF8Encoding($false)))`

  - id: mcp-registered
    instruction: >
      Confirm Claude can actually reach gbrain's tools. THIS is the "is it even
      activated?" check -- the thing that used to fail silently.
    check:
      type: contains
      cmd: claude mcp list
      expect: gbrain
    on_fail: >
      gbrain isn't registered with Claude, so Claude can't call it. Register it
      (user scope, stdio transport): claude mcp add gbrain -s user -- gbrain serve
      Then `claude mcp list` should show a connected gbrain line.

  - id: activation-exam
    instruction: >
      The real test: run a real question through gbrain's full answer pipeline
      (embeddings + database + ranking). Passing this means gbrain is genuinely
      live -- not merely installed.
    check:
      type: command_succeeds
      cmd: |
        gbrain query "trading psychology" --no-expand
    on_fail: >
      gbrain answered earlier steps but the query pipeline errored. Usually
      embeddings aren't built or the brain is unreachable. Run `gbrain doctor`
      and look for an embeddings or connection warning, then fix that and retry.

  - id: usage-discipline
    instruction: >
      Make gbrain HABITUAL, not just installed -- a brain nobody is told to use stays
      empty. Writes a usage-discipline block into CLAUDE.md, and OFFERS THE USER A
      CADENCE CHOICE (don't pick for them -- installing this pack means they want to
      use gbrain; let them choose HOW aggressively):
        - LEAN (default): search before researching + capture only what's clearly
          worth keeping. No per-message tax. ~5-15k tokens/session. Right for most.
        - EAGER: scan EVERY message and capture ideas/entities as they come up.
          Maximal capture + densest recall, but ~3-5x the tokens (~30-80k/session)
          and a little latency per reply. For power users who want the brain to fill
          fast and will keep the signal high.
      Present that tradeoff and install THEIR pick. See files/gbrain_growth_path.md
      for what building on the hub becomes (code brain, ingest pipeline, automation)
      + the full cost table. (Registering gbrain as MCP makes the tools available;
      this governs how aggressively Claude ACTS on that.) Complements gstack's
      "GBrain Search Guidance" block (search-vs-grep only).
    check:
      type: command_succeeds
      cmd: python packs/gbrain-windows/files/setup_gbrain_usage.py --check
    on_fail: >
      The gbrain usage discipline isn't in your CLAUDE.md yet, so Claude will only use
      gbrain when explicitly asked. Offer the user LEAN vs EAGER (the cadence tradeoff
      above -- token cost + capture), then install their pick (idempotent):
        lean:   python packs/gbrain-windows/files/setup_gbrain_usage.py --install
        eager:  python packs/gbrain-windows/files/setup_gbrain_usage.py --install --eager
      Don't default silently -- present the choice.
