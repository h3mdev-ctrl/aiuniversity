# guardrails -- automatic backstops that catch mistakes by CODE, not by hoping.
#
# Layer 3 of the foundation. v1 ships one core guard: a PreToolUse hook that
# blocks Claude from reading credential files (.env, private keys, .aws/
# credentials, etc.) via Read OR Bash (cat/less/head/tail/type/Get-Content). The
# behavioural check pipes a forbidden action through the INSTALLED hook and
# confirms it exits non-zero -- so this pack proves the guard actually fires end
# to end, not just that a file is present. Unlike memory's live recall probe,
# this behavioural check is fully deterministic.
#
# Commands run from the repo root.
name: guardrails
version: 0.1.0
steps:
  - id: hook-installed
    instruction: >
      Install the credential guard hook script at ~/.claude/hooks/credential_guard.py.
      This is the deterministic backstop -- it runs BEFORE Bash and Read tool calls
      and refuses ones that would touch a credential file.
    check:
      type: command_succeeds
      cmd: python packs/guardrails/files/setup_guardrails.py --check-hook-file
    fix: python packs/guardrails/files/setup_guardrails.py
    on_fail: >
      Hook file missing. Install it (idempotent):
      python packs/guardrails/files/setup_guardrails.py

  - id: registered-in-settings
    instruction: >
      Wire the hook into ~/.claude/settings.json as a PreToolUse guard on Bash+Read
      so Claude Code actually runs it before those tools fire. Merges idempotently
      with any hooks you already have.
    check:
      type: command_succeeds
      cmd: python packs/guardrails/files/setup_guardrails.py --check-registered
    fix: python packs/guardrails/files/setup_guardrails.py
    on_fail: >
      Not registered in settings.json. Register it (safe merge):
      python packs/guardrails/files/setup_guardrails.py

  - id: guard-actually-blocks
    instruction: >
      THE behavioural check -- prove the guard fires. Pipes forbidden probes
      (Read .env, `cat .env`, reading an SSH private key) through the installed
      hook and confirms it exits non-zero with a BLOCKED message. Also checks a
      harmless `ls` still passes, so it's a real gate, not a wall.
    check:
      type: command_succeeds
      cmd: python packs/guardrails/files/setup_guardrails.py --test-blocking
    fix: python packs/guardrails/files/setup_guardrails.py
    on_fail: >
      The guard didn't block a known-forbidden action (see output). Reinstall:
      python packs/guardrails/files/setup_guardrails.py

# NOTE: the session-end guard (setup_session_guard.py / session_end_guard.py) is
# shipped but NOT a default step -- it's OPT-IN. It's a Stop hook, so it can only
# nudge by exiting non-zero, which the desktop shows as an "Error" badge; and it's a
# common-language guard (it reacts whenever Claude mentions "good night" / "call it a
# day"), so on by default it would error-badge constantly -- a bad first-run for a
# self-improvement pack. The SOFT version ships by default instead: the constitution
# principle "don't tell the user when to stop" (foundation layer-2-constitution),
# which is always-loaded and creates no error state. Install the hard hook ONLY if
# that soft principle keeps getting ignored and you want enforcement:
#   python packs/guardrails/files/setup_session_guard.py            # install
#   python packs/guardrails/files/setup_session_guard.py --test-blocking
# See README.md "The session-end guard is opt-in".
#
# NOTE: the recon-before-build guard (setup_recon_build_guard.py /
# recon_before_build_guard.py) is ALSO shipped but NOT a default step -- opt-in, same
# reasoning. It's a PreToolUse(Write) hook that bounces the FIRST Write of a NEW source
# file into an already-populated repo (once per session per repo), so Claude reads the
# existing code before building a parallel version of it. The SOFT default ships in the
# constitution instead ("Recon before build", foundation layer-2-constitution) -- always
# loaded, no error state. Install the hard hook ONLY when the soft principle keeps getting
# ignored and you want the nudge to fire at the moment of the Write:
#   python packs/guardrails/files/setup_recon_build_guard.py            # install
#   python packs/guardrails/files/setup_recon_build_guard.py --test-blocking
# See README.md "The recon-before-build guard is opt-in".
