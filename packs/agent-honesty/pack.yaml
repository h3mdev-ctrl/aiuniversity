# agent-honesty -- three guardrails against confident-but-false reporting.
#
# The failure this pack targets: a model that reports CONFIDENTLY instead of
# TRUTHFULLY. Three rules, each naming the moment it fires:
#   1. no-phantom-done        -- never claim done/pushed/logged without a receipt
#   2. research-before-asserting -- check the source before stating a fact/constraint
#   3. judge-to-spec          -- grade an output against the real spec, not memory
#
# Behavioural rules can't be fully enforced by code the way a credential-read hook
# can, so this pack ships the HONEST shape the rest of aiuniversity uses for soft
# rules (see guardrails' session-end principle): the rules are installed as an
# always-loaded doc + wired into the constitution (the default, no error state),
# AND the one guardrail with a mechanical surface -- no-phantom-done -- gets a
# deterministic, model-free linter that PROVES an unevidenced completion claim is
# catchable. Enforcement (wiring the linter as a Stop hook) is opt-in; the note
# step points at the existing code-quality stop_verify for the code-test case.
#
# Requested via Nexus (thread agent-honesty-pack). Commands run from the repo root.
name: agent-honesty
version: 0.1.0
steps:
  - id: rules-installed
    instruction: >
      Install the three honesty guardrails as an always-loaded rules doc at
      ~/.claude/agent_honesty.md. Each guardrail names the moment it fires, the
      rule, why it matters, and what to do instead: no-phantom-done (claim a
      side-effect only if the tool call ran this turn and you show the receipt),
      research-before-asserting (check the source before stating a load-bearing
      fact), judge-to-spec (grade against the real spec, not a remembered copy).
    check:
      type: command_succeeds
      cmd: python packs/agent-honesty/files/setup_agent_honesty.py --check-doc
    fix: python packs/agent-honesty/files/setup_agent_honesty.py --install
    on_fail: >
      The rules doc is missing or incomplete. Install it (idempotent):
      python packs/agent-honesty/files/setup_agent_honesty.py --install

  - id: wired-into-constitution
    instruction: >
      Wire a pointer block into your global CLAUDE.md so the guardrails load every
      session (idempotent; coexists with your existing constitution). This is the
      soft default -- always in context, no error state -- the same shape guardrails
      uses for its don't-tell-the-user-when-to-stop principle.
    check:
      type: command_succeeds
      cmd: python packs/agent-honesty/files/setup_agent_honesty.py --check-wired
    fix: python packs/agent-honesty/files/setup_agent_honesty.py --install
    on_fail: >
      The CLAUDE.md pointer is missing. Wire it in (safe, marker-wrapped):
      python packs/agent-honesty/files/setup_agent_honesty.py --install

  - id: phantom-claim-linter-fires
    instruction: >
      THE behavioural check -- prove no-phantom-done has teeth. Pipes known phantom
      claims ("Done -- pushed the fix", "All tests pass", "Logged the run") through
      the model-free linter and confirms it FLAGS them, and that evidenced claims
      ("commit a1b2c3d, CI green"; "ran pytest: 219 passed, 0 failed"), future-tense
      ("I'll push once you confirm"), and neutral prose pass clean. Deterministic --
      no live model, exactly like the rest of aiuniversity's checks.
    check:
      type: command_succeeds
      cmd: python packs/agent-honesty/files/setup_agent_honesty.py --test-linter
    fix: python packs/agent-honesty/files/setup_agent_honesty.py --install
    on_fail: >
      The phantom-claim linter misjudged a case (see output). The linter lives at
      packs/agent-honesty/files/phantom_claim_lint.py -- inspect the failing case.

  - id: enforcement-note
    instruction: >
      Enforcement is OPT-IN -- the always-loaded rules above are the default. If a
      guardrail keeps slipping and you want a hard backstop:
        - no-phantom-done for CODE: the code-quality pack's stop_verify.py already
          runs your test suite before Claude may Stop --
          python -m runner.cli remediate packs/code-quality
        - no-phantom-done for CLAIMS: wire phantom_claim_lint.py as a Stop hook so an
          unevidenced completion claim raises a nudge (see README "Enforcement").
      research-before-asserting and judge-to-spec have no clean mechanical surface --
      they stay soft rules by design; naming the trigger in context is the lever.
      This step is informational and always passes.
    check:
      type: command_succeeds
      cmd: python -c "exit(0)"
